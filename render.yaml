services:
  - type: web
    name: deal-system-backend
    runtime: node
    rootDir: backend
    buildCommand: bash ../render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      # ── DELETE these from Render dashboard if they exist (they break Chromium download) ──
      # PUPPETEER_SKIP_DOWNLOAD                      ← puppeteer v21 name (main one)
      # PUPPETEER_SKIP_CHROME_DOWNLOAD               ← puppeteer v21 variant
      # PUPPETEER_SKIP_CHROMIUM_DOWNLOAD             ← old puppeteer name
      # PUPPETEER_EXECUTABLE_PATH                    ← do not point to system Chrome
      #
      # Set these in Render dashboard as secrets:
      # MONGODB_URI      = mongodb+srv://...
      # TELEGRAM_TOKEN   = 123456:ABC...
      # TELEGRAM_CHAT    = -100xxxxxxxxxx
      # JWT_SECRET       = <random 32+ char string>
      # ALLOWED_ORIGINS  = https://your-app.vercel.app
      # AUTO_MODE_DEFAULT = true
      # CRON_SCHEDULE    = */5 * * * *
