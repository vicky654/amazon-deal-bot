services:
  - type: web
    name: deal-system-backend
    runtime: node
    rootDir: backend
    buildCommand: bash ../render-build.sh
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      # ── DO NOT set PUPPETEER_EXECUTABLE_PATH or PUPPETEER_SKIP_CHROMIUM_DOWNLOAD ──
      # Puppeteer downloads its own Chromium during npm install.
      # Setting those vars breaks it when apt-get Chrome is not installed.
      #
      # Set these in Render dashboard as secrets:
      # MONGODB_URI      = mongodb+srv://...
      # TELEGRAM_TOKEN   = 123456:ABC...
      # TELEGRAM_CHAT    = -100xxxxxxxxxx
      # JWT_SECRET       = <random 32+ char string>
      # ALLOWED_ORIGINS  = https://your-app.vercel.app
      # AUTO_MODE_DEFAULT = true
      # CRON_SCHEDULE    = */5 * * * *
